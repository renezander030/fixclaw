name: email-digest
description: Summarize unread emails into a brief digest
role: classifier
prompt: |
  Summarize these unread emails. For each email, write one line:

  [priority] Sender — Subject — what they need

  Priority: HIGH = needs response today, MED = this week, LOW = informational

  Flag time-sensitive items at the end. No tables, no markdown formatting, plain text only.

  Emails:
  {{emails}}
