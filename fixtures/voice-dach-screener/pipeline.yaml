# Example DACH voice screening pipeline. Requires draftyard built with -tags voice.
#
# Flow: Dograh posts session_end webhooks to draftyard's /voice/session_end endpoint
# while calls are running. This pipeline runs on a 5-minute cadence, harvests any
# new completed sessions, runs AI extraction, and pings the operator for approval
# before any downstream write.

pipelines:
  - name: voice-dach-screener
    schedule: 5m
    steps:
      - name: harvest
        type: deterministic
        action: voice_calls_completed
        vars:
          limit: "20"

      - name: extract-outcome
        type: ai
        skill: extract-call-outcome

      - name: review
        type: approval
        mode: hitl
        channel: telegram

      - name: deliver
        type: deterministic
        action: notify
